<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="40%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Background decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#a78bfa" opacity="0.04"/>
  <circle cx="200" cy="500" r="140" fill="#60a5fa" opacity="0.04"/>
  <circle cx="1050" cy="480" r="100" fill="#f472b6" opacity="0.04"/>

  <!-- Agent network: connection lines -->
  <g stroke-width="2" opacity="0.3" filter="url(#glow)">
    <!-- Central hub to surrounding nodes -->
    <line x1="900" y1="300" x2="780" y2="180" stroke="#60a5fa"/>
    <line x1="900" y1="300" x2="1050" y2="180" stroke="#a78bfa"/>
    <line x1="900" y1="300" x2="1080" y2="340" stroke="#f472b6"/>
    <line x1="900" y1="300" x2="1020" y2="460" stroke="#34d399"/>
    <line x1="900" y1="300" x2="780" y2="440" stroke="#60a5fa"/>
    <line x1="900" y1="300" x2="720" y2="310" stroke="#a78bfa"/>
    <!-- Inter-node connections -->
    <line x1="780" y1="180" x2="1050" y2="180" stroke="#60a5fa" opacity="0.5"/>
    <line x1="1050" y1="180" x2="1080" y2="340" stroke="#a78bfa" opacity="0.5"/>
    <line x1="1080" y1="340" x2="1020" y2="460" stroke="#f472b6" opacity="0.5"/>
    <line x1="1020" y1="460" x2="780" y2="440" stroke="#34d399" opacity="0.5"/>
    <line x1="780" y1="440" x2="720" y2="310" stroke="#60a5fa" opacity="0.5"/>
    <line x1="720" y1="310" x2="780" y2="180" stroke="#a78bfa" opacity="0.5"/>
  </g>

  <!-- Animated pulse rings around central node -->
  <circle cx="900" cy="300" r="40" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  <circle cx="900" cy="300" r="60" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.1"/>
  <circle cx="900" cy="300" r="80" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.06"/>

  <!-- Central agent node -->
  <circle cx="900" cy="300" r="28" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <!-- Brain icon in central node -->
  <text x="900" y="308" text-anchor="middle" fill="white" font-size="22" font-family="Segoe UI">AI</text>

  <!-- Surrounding agent nodes -->
  <circle cx="780" cy="180" r="18" fill="url(#nodeGrad1)" filter="url(#glow)"/>
  <text x="780" y="145" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI">Perceive</text>

  <circle cx="1050" cy="180" r="18" fill="url(#nodeGrad2)" filter="url(#glow)"/>
  <text x="1050" y="145" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI">Reason</text>

  <circle cx="1080" cy="340" r="18" fill="url(#nodeGrad3)" filter="url(#glow)"/>
  <text x="1115" y="345" text-anchor="start" fill="#94a3b8" font-size="11" font-family="Segoe UI">Act</text>

  <circle cx="1020" cy="460" r="18" fill="url(#nodeGrad4)" filter="url(#glow)"/>
  <text x="1020" y="495" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI">Learn</text>

  <circle cx="780" cy="440" r="18" fill="url(#nodeGrad1)" filter="url(#glow)"/>
  <text x="780" y="475" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Segoe UI">Memory</text>

  <circle cx="720" cy="310" r="18" fill="url(#nodeGrad3)" filter="url(#glow)"/>
  <text x="685" y="315" text-anchor="end" fill="#94a3b8" font-size="11" font-family="Segoe UI">Tools</text>

  <!-- Small floating particles -->
  <circle cx="830" cy="230" r="3" fill="#60a5fa" opacity="0.4"/>
  <circle cx="980" cy="210" r="2.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="1060" cy="400" r="2" fill="#f472b6" opacity="0.4"/>
  <circle cx="870" cy="400" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="760" cy="360" r="2" fill="#60a5fa" opacity="0.35"/>
  <circle cx="950" cy="240" r="2" fill="#a78bfa" opacity="0.3"/>

  <!-- Main title text -->
  <text x="80" y="220" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="72" fill="url(#textGrad)">Agentic AI</text>

  <!-- Subtitle -->
  <text x="80" y="275" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="26" fill="#94a3b8">Building Autonomous Intelligent Systems</text>

  <!-- Thin separator line -->
  <line x1="80" y1="300" x2="380" y2="300" stroke="url(#textGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Course code & program -->
  <text x="80" y="340" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="18" fill="#60a5fa">OLI-AAI-101</text>
  <text x="80" y="375" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="16" fill="#64748b">OpenClaw Learning Initiative</text>

  <!-- Four key topic pills at the bottom-left -->
  <rect x="80" y="440" rx="20" ry="20" width="120" height="36" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1"/>
  <text x="140" y="463" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="Segoe UI" font-weight="600">LLM Agents</text>

  <rect x="215" y="440" rx="20" ry="20" width="110" height="36" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="270" y="463" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="Segoe UI" font-weight="600">Tool Use</text>

  <rect x="340" y="440" rx="20" ry="20" width="120" height="36" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1"/>
  <text x="400" y="463" text-anchor="middle" fill="#f472b6" font-size="13" font-family="Segoe UI" font-weight="600">Multi-Agent</text>

  <rect x="475" y="440" rx="20" ry="20" width="135" height="36" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="542" y="463" text-anchor="middle" fill="#34d399" font-size="13" font-family="Segoe UI" font-weight="600">RAG &amp; Memory</text>

  <!-- Bottom border accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#textGrad)" opacity="0.6"/>
</svg>
